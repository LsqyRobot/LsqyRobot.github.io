<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#1e3a5f"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1020" cy="90" r="190" fill="#22d3ee" opacity="0.12"/>
  <circle cx="120" cy="560" r="230" fill="#a7f3d0" opacity="0.11"/>
  <text x="80" y="98" font-family="PingFang SC, Microsoft YaHei, Arial" font-size="42" font-weight="700" fill="#fff">四足机器人强化学习系列</text>
  <text x="82" y="142" font-family="PingFang SC, Microsoft YaHei, Arial" font-size="22" fill="#dbeafe">从 PPO 到奖励函数，从仿真训练到 Sim2Real</text>
  <g transform="translate(78 205)" font-family="PingFang SC, Microsoft YaHei, Arial" filter="url(#shadow)">
    <g>
      <rect width="185" height="138" rx="24" fill="url(#card)" stroke="#93c5fd" stroke-opacity="0.35"/>
      <text x="24" y="45" font-size="26" font-weight="700" fill="#fff">00 路线图</text>
      <text x="24" y="82" font-size="17" fill="#dbeafe">学什么</text>
      <text x="24" y="110" font-size="17" fill="#dbeafe">怎么练</text>
    </g>
    <g transform="translate(210 0)">
      <rect width="185" height="138" rx="24" fill="url(#card)" stroke="#67e8f9" stroke-opacity="0.35"/>
      <text x="24" y="45" font-size="26" font-weight="700" fill="#fff">01 PPO</text>
      <text x="24" y="82" font-size="17" fill="#dbeafe">状态/动作</text>
      <text x="24" y="110" font-size="17" fill="#dbeafe">策略/价值</text>
    </g>
    <g transform="translate(420 0)">
      <rect width="185" height="138" rx="24" fill="url(#card)" stroke="#5eead4" stroke-opacity="0.35"/>
      <text x="24" y="45" font-size="26" font-weight="700" fill="#fff">02 训练</text>
      <text x="24" y="82" font-size="17" fill="#dbeafe">仿真环境</text>
      <text x="24" y="110" font-size="17" fill="#dbeafe">并行采样</text>
    </g>
    <g transform="translate(630 0)">
      <rect width="185" height="138" rx="24" fill="url(#card)" stroke="#86efac" stroke-opacity="0.35"/>
      <text x="24" y="45" font-size="26" font-weight="700" fill="#fff">03 奖励</text>
      <text x="24" y="82" font-size="17" fill="#dbeafe">速度跟踪</text>
      <text x="24" y="110" font-size="17" fill="#dbeafe">能耗/稳定</text>
    </g>
    <g transform="translate(840 0)">
      <rect width="185" height="138" rx="24" fill="url(#card)" stroke="#fde68a" stroke-opacity="0.35"/>
      <text x="24" y="45" font-size="26" font-weight="700" fill="#fff">04 实机</text>
      <text x="24" y="82" font-size="17" fill="#dbeafe">域随机化</text>
      <text x="24" y="110" font-size="17" fill="#dbeafe">安全验证</text>
    </g>
  </g>
  <path d="M110 430 C280 355, 420 520, 590 440 S910 360, 1070 455" fill="none" stroke="#a7f3d0" stroke-width="6" stroke-linecap="round" opacity="0.75"/>
  <g fill="#e0f2fe" font-family="PingFang SC, Microsoft YaHei, Arial" font-size="18">
    <text x="95" y="500">观测 obs</text><text x="285" y="500">策略 π(a|s)</text><text x="505" y="500">仿真 rollout</text><text x="735" y="500">奖励 reward</text><text x="955" y="500">真实机器人</text>
  </g>
</svg>
