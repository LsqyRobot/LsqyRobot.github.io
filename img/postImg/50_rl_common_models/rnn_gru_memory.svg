<svg xmlns="http://www.w3.org/2000/svg" width="980" height="380" viewBox="0 0 980 380">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4b5563"/></marker>
    <style>
      .title{font:700 24px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}
      .label{font:600 17px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}
      .small{font:14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#374151}
      .tiny{font:13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#6b7280}
      .obs{fill:#eff6ff;stroke:#60a5fa;stroke-width:2}
      .state{fill:#f0fdf4;stroke:#22c55e;stroke-width:2}
      .act{fill:#fdf2f8;stroke:#f472b6;stroke-width:2}
      .gate{fill:#fff7ed;stroke:#fb923c;stroke-width:2}
      .arrow{stroke:#4b5563;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#9ca3af;stroke-width:2;fill:none;stroke-dasharray:6 6;marker-end:url(#arrow)}
    </style>
  </defs>
  <text class="title" x="32" y="42">RNN / GRU：当前动作不只看当前观测，还看历史记忆</text>

  <g transform="translate(70,95)">
    <rect class="obs" x="0" y="95" width="110" height="54" rx="12"/><text class="label" x="35" y="128">o₁</text>
    <rect class="state" x="0" y="0" width="110" height="62" rx="12"/><text class="label" x="35" y="37">h₁</text>
    <rect class="act" x="0" y="205" width="110" height="54" rx="12"/><text class="label" x="35" y="238">a₁</text>
    <path class="arrow" d="M55 95 V66"/><path class="arrow" d="M55 64 V198"/>
  </g>

  <g transform="translate(280,95)">
    <rect class="obs" x="0" y="95" width="110" height="54" rx="12"/><text class="label" x="35" y="128">o₂</text>
    <rect class="state" x="0" y="0" width="110" height="62" rx="12"/><text class="label" x="35" y="37">h₂</text>
    <rect class="act" x="0" y="205" width="110" height="54" rx="12"/><text class="label" x="35" y="238">a₂</text>
    <path class="arrow" d="M55 95 V66"/><path class="arrow" d="M55 64 V198"/>
  </g>

  <g transform="translate(490,95)">
    <rect class="obs" x="0" y="95" width="110" height="54" rx="12"/><text class="label" x="35" y="128">o₃</text>
    <rect class="state" x="0" y="0" width="110" height="62" rx="12"/><text class="label" x="35" y="37">h₃</text>
    <rect class="act" x="0" y="205" width="110" height="54" rx="12"/><text class="label" x="35" y="238">a₃</text>
    <path class="arrow" d="M55 95 V66"/><path class="arrow" d="M55 64 V198"/>
  </g>

  <path class="arrow" d="M181 126 C220 96,240 96,279 126"/>
  <path class="arrow" d="M391 126 C430 96,450 96,489 126"/>
  <text class="small" x="220" y="84">h₁ 传给下一步</text>
  <text class="small" x="430" y="84">h₂ 传给下一步</text>

  <rect class="gate" x="720" y="105" width="210" height="145" rx="14"/>
  <text class="label" x="766" y="138">GRU 的门控</text>
  <text class="small" x="750" y="170">更新门 zₜ：写入多少新信息</text>
  <text class="small" x="750" y="198">重置门 rₜ：忘掉多少旧记忆</text>
  <text class="tiny" x="750" y="228">本质：选择性记忆，而不是粗暴覆盖</text>

  <path class="dash" d="M602 126 C660 120,680 145,718 165"/>
  <text class="small" x="56" y="350">在部分可观测任务里，hidden state hₜ 相当于 policy 的“短期记忆”。</text>
</svg>
