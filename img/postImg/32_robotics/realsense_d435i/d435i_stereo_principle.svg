<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520">
  <defs>
    <style>
      .bg{fill:#fbfbfd}.box{fill:#fff;stroke:#333;stroke-width:2;rx:14}.cam{fill:#1f2937}.ir{fill:#5b8def}.rgb{fill:#e76f51}.line{stroke:#666;stroke-width:2}.ray{stroke:#5b8def;stroke-width:2;stroke-dasharray:6 6}.txt{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:22px;fill:#222}.small{font-size:17px;fill:#444}.title{font-size:30px;font-weight:700}.note{font-size:16px;fill:#666}</style>
  </defs>
  <rect class="bg" width="960" height="520"/>
  <text x="40" y="48" class="txt title">RealSense D435i：主动双目深度的直观理解</text>
  <rect x="110" y="330" width="520" height="95" class="box"/>
  <circle cx="185" cy="378" r="28" class="cam"/><text x="145" y="455" class="txt small">左红外相机</text>
  <circle cx="385" cy="378" r="28" class="cam"/><text x="345" y="455" class="txt small">右红外相机</text>
  <circle cx="545" cy="378" r="28" class="rgb"/><text x="510" y="455" class="txt small">RGB相机</text>
  <rect x="260" y="350" width="58" height="35" rx="8" class="ir"/><text x="235" y="455" class="txt small">红外投射器</text>
  <line x1="185" y1="378" x2="385" y2="378" class="line"/>
  <text x="245" y="320" class="txt small">双目基线 baseline</text>
  <circle cx="310" cy="155" r="42" fill="#f4a261" stroke="#333" stroke-width="2"/>
  <text x="270" y="103" class="txt small">空间中的点</text>
  <line x1="185" y1="378" x2="310" y2="155" class="ray"/>
  <line x1="385" y1="378" x2="310" y2="155" class="ray"/>
  <path d="M260 350 C260 250 260 225 300 170" class="ray" fill="none" stroke="#7c3aed"/>
  <path d="M318 350 C318 250 330 225 320 170" class="ray" fill="none" stroke="#7c3aed"/>
  <rect x="670" y="120" width="230" height="230" class="box"/>
  <text x="695" y="160" class="txt">核心流程</text>
  <text x="695" y="202" class="txt small">1. 投射红外纹理</text>
  <text x="695" y="236" class="txt small">2. 左右 IR 同时拍摄</text>
  <text x="695" y="270" class="txt small">3. 找同一个点的视差</text>
  <text x="695" y="304" class="txt small">4. 视差越大 → 越近</text>
  <text x="695" y="338" class="txt small">5. 输出每个像素的深度</text>
  <text x="40" y="492" class="txt note">说明：D435i 是主动双目，不是 ToF；IMU 只提供运动信息，不直接“看见深度”。</text>
</svg>
